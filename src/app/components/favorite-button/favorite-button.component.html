<div class="card-wrapper">
  <div class="heart-container">
    @if (isFavorite()) {
      <img
        src="/full1.png"
        alt="Favorite Heart"
        class="heart-image"
        (click)="toggle()"
      />
    } @else {
      <img
        src="/empty1.png"
        alt="Not Favorite Heart"
        class="heart-image"
        (click)="toggle()"
      />
    }
  </div>
</div>
