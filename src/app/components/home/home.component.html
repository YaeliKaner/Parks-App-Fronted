<header class="site-header">
  <img
    src="/Logo_Regular-1024x221.png"
    class="site-logo"
    alt="Park Share Vibe logo"
  />

  <nav class="main-nav">
    <button class="nav-button recommended-button" (click)="goToRecommended()">
      ⭐ Recommended
    </button>
    <button class="nav-button subtle-action" (click)="onSignIn()">
      Sign in
    </button>
    <button class="nav-button subtle-action" (click)="onSignUp()">
      Sign up
    </button>
    <button
      class="nav-button primary-action"
      (click)="goToAllParks()"
    >

    </button>
