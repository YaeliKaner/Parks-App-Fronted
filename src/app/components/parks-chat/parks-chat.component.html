<div class="chat-wrapper">

  <div class="chat-header">
    <div class="chat-title">Parks Assistant</div>
    <div class="chat-subtitle">Which park are you looking for?</div>
  </div>




  <div class="chat-box">
    <!-- User bubble (last question) -->
    <div class="msg user" *ngIf="userPrompt && !isLoading">
      {{ userPrompt }}
    </div>

    <!-- Loading animation -->
    <div class="loading" *ngIf="isLoading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <!-- AI bubble -->
    <div class="msg ai" *ngIf="aiAnswer">
      {{ aiAnswer }}
    </div>
  </div>

  <div class="input-area">
    <textarea
      [(ngModel)]="userPrompt"
      placeholder="Which park are you looking for?"
    ></textarea>

    <button (click)="send()" [disabled]="isLoading" aria-label="Send message">
      ▶
    </button>
  </div>

  <p *ngIf="errorMsg" class="error">{{ errorMsg }}</p>

</div>
